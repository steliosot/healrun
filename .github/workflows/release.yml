name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        run: |
          BINARY_NAME=healrun-${{ matrix.goos }}-${{ matrix.goarch }}
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" -o $BINARY_NAME ./cmd/healrun

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: healrun-${{ matrix.goos }}-${{ matrix.goarch }}
          path: healrun-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create release and upload assets
        run: |
          gh release create ${{ github.ref_name }} --title "v${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}" ./artifacts/*/*
        env:
          GH_TOKEN: ${{ github.token }}